<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 多語種移工 DEI 認證平台｜Demo</title>
<style>
  :root{--bg:#0d1424;--card:#151d31;--card2:#1d2740;--brand:#18b6a6;--brand2:#3ad6c4;
    --accent:#f5b53d;--ink:#eaf0f7;--muted:#8a97ad;--line:#26324c;--ok:#2fce8b;--bad:#ff5d6c;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:radial-gradient(1000px 600px at 50% -10%,#16233f,var(--bg) 60%);color:var(--ink);min-height:100vh}
  .top{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(13,20,36,.9);backdrop-filter:blur(8px);z-index:10}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:flex;align-items:center;justify-content:center;font-weight:900;color:#04201c}
  .top h1{font-size:15px;margin:0;font-weight:800}
  .top .sub{font-size:11px;color:var(--muted)}
  .nav{margin-left:auto;display:flex;gap:8px}
  .nav button{background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 12px;
    border-radius:9px;font-size:12px;cursor:pointer;font-weight:600}
  .nav button.on{background:var(--card2);color:var(--ink);border-color:var(--brand)}
  .wrap{max-width:600px;margin:0 auto;padding:24px 18px 60px}
  .card{background:linear-gradient(180deg,var(--card),#121a2c);border:1px solid var(--line);
    border-radius:18px;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,.35)}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#04201c;
    background:linear-gradient(135deg,var(--brand2),var(--brand));padding:5px 10px;border-radius:20px}
  h2{font-size:20px;margin:14px 0 6px}
  .muted{color:var(--muted);font-size:13px;line-height:1.6}
  .langgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .lang{display:flex;align-items:center;gap:12px;background:var(--card2);border:2px solid var(--line);
    border-radius:14px;padding:15px;cursor:pointer;transition:.12s}
  .lang:hover{border-color:var(--brand)}
  .lang .fl{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff}
  .lang b{font-size:15px}.lang span{display:block;font-size:11px;color:var(--muted)}
  .scene{background:var(--card2);border-left:3px solid var(--brand);border-radius:10px;padding:14px 16px;
    margin:16px 0;font-size:15px;line-height:1.7}
  .pts{list-style:none;padding:0;margin:8px 0}
  .pts li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;font-size:14px}
  .pts li:before{content:"✓";color:var(--ok);font-weight:900;flex:none}
  .btn{width:100%;padding:15px;border:none;border-radius:13px;font-size:16px;font-weight:800;cursor:pointer;
    color:#04201c;background:linear-gradient(135deg,var(--brand2),var(--brand));margin-top:16px;box-shadow:0 8px 20px rgba(24,182,166,.3)}
  .btn:active{transform:translateY(2px)}
  .btn.sec{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.play{width:auto;padding:9px 15px;font-size:13px;margin:0}
  .q{margin:18px 0}
  .q .qt{font-weight:700;font-size:15px;margin-bottom:10px}
  .opt{display:block;background:var(--card2);border:2px solid var(--line);border-radius:12px;
    padding:13px 15px;margin-bottom:9px;cursor:pointer;font-size:14px}
  .opt.sel{border-color:var(--brand);background:rgba(24,182,166,.12)}
  .opt.correct{border-color:var(--ok);background:rgba(47,206,139,.15)}
  .opt.wrong{border-color:var(--bad);background:rgba(255,93,108,.12)}
  .row{display:flex;gap:10px}
  input.name{width:100%;padding:13px 15px;border-radius:12px;border:1px solid var(--line);background:#0f1626;color:var(--ink);font-size:15px;margin-top:8px}
  /* certificate */
  .cert{background:linear-gradient(160deg,#fbf7ec,#fff);color:#2a2416;border-radius:16px;padding:26px 22px;
    border:2px solid var(--accent);position:relative;overflow:hidden;text-align:center}
  .cert:before{content:"";position:absolute;inset:8px;border:1.5px solid #e6cf8a;border-radius:11px;pointer-events:none}
  .cert .k{font-size:12px;color:#9a8a5a;letter-spacing:3px}
  .cert h3{font-size:22px;margin:8px 0 2px;color:#1a1710}
  .cert .nm{font-size:26px;font-weight:900;margin:14px 0 4px;color:#7a5c12}
  .cert .cs{font-size:14px;color:#5a5240}
  .cert .meta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:20px;font-size:11px;color:#7a725a;text-align:left}
  .qr{width:88px;height:88px;background:#fff;border:1px solid #ddd;padding:5px;border-radius:8px}
  .dash{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
  .kpi{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
  .kpi b{display:block;font-size:26px;color:var(--brand2)}
  .kpi span{font-size:11px;color:var(--muted)}
  .bars{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:6px}
  .bar{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13px}
  .bar .lb{width:96px;color:var(--muted)}
  .bar .tr{flex:1;height:12px;background:#0f1626;border-radius:6px;overflow:hidden}
  .bar .fi{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2))}
  .hide{display:none}
  .steps{display:flex;gap:6px;margin:14px 0 2px}
  .steps i{flex:1;height:4px;border-radius:3px;background:var(--line)}
  .steps i.on{background:var(--brand)}
</style>
</head>
<body>
<div class="top">
  <div class="logo">ESG</div>
  <div><h1>AI 多語種移工 DEI 合規認證平台</h1><div class="sub">AI-Bridge · AI-Edu · 企業戰情室　Demo</div></div>
  <div class="nav">
    <button id="nvLearn" class="on" onclick="goLearn()">培訓認證</button>
    <button id="nvDash" onclick="goDash()">企業戰情室</button>
  </div>
</div>
<div class="wrap" id="app"></div>

   scene:"พนักงานทุกคนไม่ว่าจะสัญชาติ เพศ หรือศาสนาใด ควรได้รับการปฏิบัติอย่างเท่าเทียมและได้รับความเคารพ หากพบการเลือกปฏิบัติหรือการปฏิบัติที่ไม่เป็นธรรม คุณมีสิทธิ์แจ้งผ่านช่องทางร้องเรียนของบริษัท",

      {q:"ข้อใดเป็นสิทธิขั้นพื้นฐานของพนักงาน?",o:["ได้รับการปฏิบัติที่เท่าเทียมและเคารพ","ทำงานล่วงเวลาโดยไม่ได้ค่าจ้าง","ถูกโยกย้ายตามอำเภอใจ"],a:0},

const VOICE={zh:"zh-TW",en:"en-US",id:"id-ID",vi:"vi-VN",th:"th-TH"};
const app=document.getElementById('app');
let lang='zh', step='lang', answers=[null,null,null], learnerName='', mode='learn';

function T(){return I18N[lang];}
function setStep(s){step=s;render();}
function stepbar(n){return `<div class="steps">${[0,1,2,3].map(i=>`<i class="${i<=n?'on':''}"></i>`).join('')}</div>`;}

function render(){
  if(mode==='dash'){renderDash();return;}
  const t=T();
  if(step==='lang'){
    app.innerHTML=`<div class="card">
      <span class="badge">AI-Bridge · 多語生成</span>
      <h2>${t.pick}</h2><div class="muted">${t.picksub}</div>
      <div class="langgrid">${Object.keys(I18N).map(k=>`
        <div class="lang" onclick="pickLang('${k}')">
          <div class="fl" style="background:${I18N[k].col}">${k.toUpperCase()}</div>
          <div><b>${I18N[k].name}</b><span>${I18N[k].en}</span></div>
        </div>`).join('')}</div></div>`;
  }
  else if(step==='lesson'){
    app.innerHTML=`<div class="card">${stepbar(0)}
      <span class="badge">${t.gen} · AI-Edu</span>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <h2 style="margin:0">${t.course}</h2>
        <button class="btn play" onclick="speak()">${t.play}</button></div>
      <div class="muted">${t.lesson}</div>
      <div class="scene">${t.scene}</div>
      <ul class="pts">${t.pts.map(p=>`<li>${p}</li>`).join('')}</ul>
      <button class="btn" onclick="setStep('exam')">${t.toExam} →</button>
      <button class="btn sec" onclick="setStep('lang')">${t.again}</button></div>`;
    setTimeout(speak,300);
  }
  else if(step==='exam'){
    app.innerHTML=`<div class="card">${stepbar(1)}
      <span class="badge">AI-Edu · 線上考試</span><h2>${t.exam}</h2>
      ${t.Q.map((q,qi)=>`<div class="q"><div class="qt">${qi+1}. ${q.q}</div>
        ${q.o.map((o,oi)=>`<label class="opt" id="o${qi}_${oi}" onclick="pick(${qi},${oi})">${o}</label>`).join('')}</div>`).join('')}
      <button class="btn" onclick="grade()">${t.submit}</button></div>`;
    answers=[null,null,null];
  }
  else if(step==='name'){
    app.innerHTML=`<div class="card">${stepbar(2)}
      <span class="badge">${t.passed}</span>
      <h2>${t.score}: ${score}/3　✅</h2>
      <div class="muted">${t.certTitle}</div>
      <input class="name" id="nm" placeholder="${t.namePH}" value="${learnerName}">
      <button class="btn" onclick="makeCert()">${t.getCert} →</button></div>`;
  }
  else if(step==='cert'){
    const d=new Date(); const ds=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
    const cid='DEI-'+d.getFullYear()+'-'+Math.floor(100000+Math.random()*899999);
    app.innerHTML=`<div class="card">${stepbar(3)}
      <div class="cert">
        <div class="k">${t.certK}</div>
        <h3>${t.certTitle}</h3>
        <div class="nm">${learnerName||'—'}</div>
        <div class="cs">${t.completes}<br><b>${t.course}</b></div>
        <div class="meta">
          <div>${t.issued}: ${ds}<br>${t.cid}: ${cid}<br>${t.verify}</div>
          <div class="qr">${qrSVG(cid)}</div>
        </div>
      </div>
      <button class="btn" onclick="goDash()">查看企業戰情室 →</button>
      <button class="btn sec" onclick="setStep('lang')">${t.again}</button></div>`;
  }
}
window.pickLang=(k)=>{lang=k;setStep('lesson');};
window.pick=(qi,oi)=>{answers[qi]=oi;T().Q[qi].o.forEach((_,i)=>{document.getElementById('o'+qi+'_'+i).classList.toggle('sel',i===oi);});};
let score=0;
window.grade=()=>{
  if(answers.includes(null)){alert('請作答所有題目 / Please answer all');return;}
  score=T().Q.reduce((n,q,i)=>n+(answers[i]===q.a?1:0),0);
  T().Q.forEach((q,qi)=>{const s=document.getElementById('o'+qi+'_'+q.a);s&&s.classList.add('correct');
    if(answers[qi]!==q.a){const w=document.getElementById('o'+qi+'_'+answers[qi]);w&&w.classList.add('wrong');}});
  setTimeout(()=>{ if(score>=2) setStep('name'); else { alert(T().failed+' ('+score+'/3)'); setStep('exam'); } },900);
};
window.makeCert=()=>{learnerName=document.getElementById('nm').value.trim()||'Worker';setStep('cert');};

// pseudo-QR (示範用視覺，非可掃描)
function qrSVG(seed){
  let h=0;for(const c of seed)h=(h*31+c.charCodeAt(0))>>>0;
  const N=21,cell=100/N;let r='<svg viewBox="0 0 100 100" width="78" height="78">';
  const finder=(x,y)=>{r+=`<rect x="${x*cell}" y="${y*cell}" width="${cell*7}" height="${cell*7}" fill="#111"/>`+
    `<rect x="${(x+1)*cell}" y="${(y+1)*cell}" width="${cell*5}" height="${cell*5}" fill="#fff"/>`+
    `<rect x="${(x+2)*cell}" y="${(y+2)*cell}" width="${cell*3}" height="${cell*3}" fill="#111"/>`;};
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const inF=(x<7&&y<7)||(x>=N-7&&y<7)||(x<7&&y>=N-7);
    if(inF)continue;
    h=(h*1103515245+12345)>>>0;
    if((h>>16&1)) r+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="#111"/>`;
  }
  finder(0,0);finder(N-7,0);finder(0,N-7);
  return r+'</svg>';
}
