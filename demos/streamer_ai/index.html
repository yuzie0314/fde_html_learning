<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dr.Chen 官方 AI 小助手｜Demo</title>
<style>
  :root{
    --bg:#080b16;--panel:#0e1430;--card:#121830;--ink:#eaf0ff;--muted:#8891b4;
    --cyan:#25e0e6;--mag:#b14dff;--line:#222b4d;--line2:#232c50;--ok:#2fe0a6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:#080b16;color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
    background-image:radial-gradient(600px 400px at 15% 0%,rgba(37,224,230,.14),transparent 60%),radial-gradient(600px 400px at 100% 100%,rgba(177,77,255,.16),transparent 55%);}
  .phone{width:100%;max-width:410px;height:min(780px,94vh);border-radius:24px;overflow:hidden;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#0d1226,#0a0e1c);
    border:1px solid #23305c;box-shadow:0 0 0 1px rgba(37,224,230,.08),0 30px 80px rgba(0,0,0,.6),inset 0 0 60px rgba(37,224,230,.03)}
  .top{padding:16px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line2);
    background:linear-gradient(90deg,rgba(37,224,230,.10),rgba(177,77,255,.10))}
  .av{width:44px;height:44px;border-radius:13px;flex:none;position:relative;
    background:linear-gradient(135deg,var(--cyan),var(--mag));display:flex;align-items:center;justify-content:center;
    font-weight:900;color:#06121a;font-size:15px;box-shadow:0 0 18px rgba(37,224,230,.5)}
  .av .live{position:absolute;right:-4px;top:-6px;background:#ff3b5c;color:#fff;font-size:8px;font-weight:800;
    padding:2px 5px;border-radius:6px;letter-spacing:.5px;box-shadow:0 0 10px rgba(255,59,92,.7)}
  .nm{font-weight:800;font-size:16px;letter-spacing:.3px}
  .st{font-size:11px;color:var(--cyan)}
  .voice{margin-left:auto;background:rgba(37,224,230,.12);border:1px solid rgba(37,224,230,.4);color:var(--cyan);
    font-size:12px;font-weight:700;padding:7px 11px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:5px}
  .voice.off{opacity:.5;border-color:var(--line2);color:var(--muted)}
  .chat{flex:1;overflow-y:auto;padding:18px 15px;display:flex;flex-direction:column;gap:11px}
  .chat::-webkit-scrollbar{width:0}
  .msg{max-width:82%;padding:12px 15px;font-size:14.5px;line-height:1.6;white-space:pre-wrap;border-radius:15px;animation:in .25s ease}
  @keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .bot{align-self:flex-start;background:rgba(28,36,66,.85);border:1px solid var(--line2);border-bottom-left-radius:4px}
  .me{align-self:flex-end;color:#06121a;font-weight:600;border-bottom-right-radius:4px;
    background:linear-gradient(135deg,var(--cyan),#54ecf0);box-shadow:0 4px 18px rgba(37,224,230,.35)}
  .time{font-size:10px;color:var(--muted);margin:1px 4px}
  .me+.time{align-self:flex-end}
  .chips{display:flex;flex-wrap:wrap;gap:8px;align-self:flex-start;max-width:94%}
  .chip{background:rgba(177,77,255,.10);border:1px solid rgba(177,77,255,.45);color:#d9b6ff;font-size:12.5px;font-weight:600;
    padding:8px 13px;border-radius:20px;cursor:pointer;transition:.12s}
  .chip:active{transform:scale(.96);background:rgba(177,77,255,.2)}
  .typing{align-self:flex-start;background:rgba(28,36,66,.85);border:1px solid var(--line2);padding:13px 16px;border-radius:15px;display:flex;gap:4px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:b 1s infinite}
  .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
  .foot{border-top:1px solid var(--line2);padding:11px 12px;display:flex;gap:8px;align-items:center;background:rgba(8,11,22,.6)}
  .foot input{flex:1;border:1px solid var(--line2);border-radius:22px;padding:12px 15px;font-size:15px;outline:none;background:#0b1024;color:var(--ink)}
  .foot input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(37,224,230,.12)}
  .send{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;flex:none;color:#06121a;font-size:16px;
    background:linear-gradient(135deg,var(--cyan),var(--mag));box-shadow:0 0 16px rgba(37,224,230,.45)}
  .badge{font-size:9px;text-align:center;color:var(--muted);padding:4px}
  a.link{color:var(--cyan);text-decoration:none;border-bottom:1px dashed rgba(37,224,230,.5)}
</style>
</head>
<body>
<div class="phone">
  <div class="top">
    <div class="av">DC<span class="live">LIVE</span></div>
    <div><div class="nm">Dr.Chen · AI 小助手</div><div class="st">◉ 24H 線上　·　實況・社群・合作</div></div>
    <button class="voice" id="voice">🔊 語音</button>
  </div>
  <div class="chat" id="chat"></div>
  <div class="foot">
    <input id="inp" placeholder="輸入問題，或點下方按鈕…" autocomplete="off">
    <button class="send" id="send">➤</button>
  </div>
  <div class="badge">AI 小助手 Demo · 示範用（實際內容依 Dr.Chen 提供資料設定）</div>
</div>

<script>
const INTENTS=[
 {k:["直播","幾點","開播","時間","什麼時候","schedule","實況"],
  a:"Dr.Chen 的直播時間表 🎮\n・週一 / 三 / 五　21:00 開台\n・週六　20:00 特別場（挑戰賽）\n開台前 30 分鐘社群會發通知，別錯過！",
  c:["在哪裡看直播","怎麼收到開播通知","加入社群"]},
 {k:["哪看","哪裡看","平台","twitch","youtube","yt","頻道","在哪"],
  a:"可以在這些地方看直播 📺\n・YouTube：Dr.Chen 頻道\n・Twitch：drchen\n（實際連結由 Dr.Chen 提供後填入）點下面就能追蹤！",
  c:["怎麼收到開播通知","直播時間","合作邀約"]},
 {k:["通知","追蹤","提醒","訂閱","開播提醒","關注"],
  a:"想第一時間收到開播通知 🔔\n1. 到 YouTube 頻道按「訂閱 + 小鈴鐺」\n2. Twitch 點「追蹤 Follow」\n3. 加入官方社群，開台自動推播\n這樣就不會錯過任何一場囉！",
  c:["加入社群","直播時間","抖內支持"]},
 {k:["社群","discord","line","telegram","群組","加入","tg","官方群"],
  a:"歡迎加入官方社群 💬\n・Discord：即時聊天、活動公告\n・LINE 社群 / Telegram：開台通知\n（連結由 Dr.Chen 提供後填入）在這裡跟大家一起看台最熱鬧！",
  c:["直播時間","合作邀約","常見問題"]},
 {k:["合作","業配","商案","邀約","聯繫","經紀","廠商","贊助商","商業"],
  a:"合作與業配洽詢 🤝\n歡迎廠商 / 媒體來信談合作！\n・請提供：品牌、合作形式、檔期與預算\n・洽詢窗口：business@（Dr.Chen 提供）\n我會盡快幫您轉達給本人 / 經紀窗口。",
  c:["常見問題","加入社群","直播時間"]},
 {k:["抖內","斗內","贊助","donate","支持","打賞","乾爹"],
  a:"謝謝你想支持 Dr.Chen 🙌\n・直播中可透過平台的抖內功能\n・或到官方頁面的支持連結\n（連結由 Dr.Chen 提供後填入）你的支持是持續開台的最大動力！",
  c:["直播時間","加入社群","合作邀約"]},
 {k:["你是誰","介紹","關於","是誰","自我介紹","dr.chen","drchen","chen"],
  a:"嗨，我是 Dr.Chen 的官方 AI 小助手 🤖\nDr.Chen 是一位遊戲實況主，常帶來遊戲實況與各種挑戰內容。有任何關於直播、社群、合作的問題都可以問我！",
  c:["直播時間","加入社群","合作邀約"]},
 {k:["器材","設備","配備","滑鼠","鍵盤","電腦","規格"],
  a:"常被問到的直播器材 🖥️\n・這部分 Dr.Chen 會不定期在社群分享\n・詳細清單可到社群精華區查看\n想知道特定裝備也可以私訊小編喔！",
  c:["加入社群","直播時間","常見問題"]},
 // 中性處理：Bybit / 刮刮樂 / 活動 — 不做誘導，導向社群公告
 {k:["活動","抽獎","刮刮樂","bybit","代理","優惠碼","註冊","入金","加密","幣","邀請碼","投資"],
  a:"關於活動與優惠資訊 📢\n最新活動一律以「官方社群公告」為準，請至 Discord 查看或私訊小編確認，避免被假冒帳號詐騙。\n※ 相關內容涉及個人理財，請務必自行評估、量力而為。",
  c:["加入社群","直播時間","合作邀約"]},
 {k:["謝謝","感謝","thank","了解","好的","ok","讚"],
  a:"不客氣！有需要隨時再問我 😄 記得準時來看台～",
  c:["直播時間","加入社群"]},
 {k:["你好","哈囉","hi","hello","嗨","在嗎","安安"],
  a:"哈囉！我是 Dr.Chen 的 AI 小助手 👋 想了解直播時間、加入社群，還是談合作呢？",
  c:["直播時間","加入社群","合作邀約"]},
];
const FB={a:"這題我先記下來了 📝 我可以幫你查：直播時間、在哪看、加入社群、合作業配、抖內支持等。你想先了解哪個？",
  c:["直播時間","加入社群","合作邀約","常見問題"]};

const chat=document.getElementById('chat');let voiceOn=true;
const now=()=>new Date().toTimeString().slice(0,5);
const scroll=()=>chat.scrollTop=chat.scrollHeight;
function addMe(t){const d=document.createElement('div');d.className='msg me';d.textContent=t;chat.appendChild(d);
  const m=document.createElement('div');m.className='time';m.textContent=now();chat.appendChild(m);scroll();}
function typing(){const d=document.createElement('div');d.className='typing';d.id='ty';d.innerHTML='<i></i><i></i><i></i>';chat.appendChild(d);scroll();return d;}
function speak(t){if(!voiceOn||!window.speechSynthesis)return;const c=t.replace(/[🎮📺🔔💬🤝🙌🤖🖥️📢📝😄👋◉※・]/g,' ');
  const u=new SpeechSynthesisUtterance(c);u.lang='zh-TW';u.rate=1.05;speechSynthesis.cancel();speechSynthesis.speak(u);}
function addBot(t,chips){const d=document.createElement('div');d.className='msg bot';d.textContent=t;chat.appendChild(d);
  const m=document.createElement('div');m.className='time';m.textContent=now();chat.appendChild(m);
  if(chips&&chips.length){const c=document.createElement('div');c.className='chips';
    chips.forEach(x=>{const b=document.createElement('button');b.className='chip';b.textContent=x;b.onclick=()=>{addMe(x);respond(x);};c.appendChild(b);});chat.appendChild(c);}
  scroll();speak(t);}
function match(text){const t=text.toLowerCase();let best=null,sc=0;
  for(const it of INTENTS){const s=it.k.reduce((n,k)=>n+(t.includes(k.toLowerCase())?1:0),0);if(s>sc){sc=s;best=it;}}
  return sc>0?best:FB;}
function respond(text){const ty=typing();setTimeout(()=>{ty.remove();const r=match(text);addBot(r.a,r.c);},650+Math.random()*450);}
function submit(){const v=document.getElementById('inp').value.trim();if(!v)return;document.getElementById('inp').value='';addMe(v);respond(v);}
document.getElementById('send').onclick=submit;
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
document.getElementById('voice').onclick=function(){voiceOn=!voiceOn;this.classList.toggle('off',!voiceOn);
  this.textContent=voiceOn?'🔊 語音':'🔇 語音';if(!voiceOn&&window.speechSynthesis)speechSynthesis.cancel();};
setTimeout(()=>addBot("哈囉！我是 Dr.Chen 的官方 AI 小助手 🤖\n想知道直播時間、加入社群，還是談合作呢？點下面或直接打字問我！",
  ["直播時間","加入社群","合作邀約","抖內支持"]),400);
</script>
</body>
</html>
